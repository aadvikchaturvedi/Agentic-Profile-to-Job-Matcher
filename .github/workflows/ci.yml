name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt

      - name: Install Playwright browsers
        working-directory: ./backend
        run: |
          python -m playwright install --with-deps chromium

      - name: Type check
        working-directory: ./backend
        run: python -m mypy . --ignore-missing-imports || true

      - name: Import smoke test
        working-directory: ./backend
        run: |
          python -c "from app.main import app; from new.pipeline import Pipeline; from new.api.ws import router as ws_router; print('All imports OK')"

      - name: Boot and health check
        working-directory: ./backend
        run: |
          export JOBEXTRACT_DATABASE_URL="sqlite:///$(pwd)/ci_smoke.db"
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          APP_PID=$!
          for i in {1..30}; do
            curl -s http://127.0.0.1:8000/api/new/health | grep -q '"status":"ok"' && break
            sleep 1
          done
          curl -s http://127.0.0.1:8000/api/new/health
          kill $APP_PID || true
          rm -f ci_smoke.db

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend-next
        run: npm ci

      - name: Build
        working-directory: ./frontend-next
        run: npm run build
